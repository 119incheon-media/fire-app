    // Sub-Component 1: CPR Simulator Module
    function CPRManager() {
      const [bpmHistory, setBpmHistory] = useState([]);
      const [currentBpm, setCurrentBpm] = useState(0);
      const [challengeActive, setChallengeActive] = useState(false);
      const [timerSeconds, setTimerSeconds] = useState(30);
      const [score, setScore] = useState(0);
      const [isMuted, setIsMuted] = useState(false);
      const [resultGrade, setResultGrade] = useState(null);

      const lastPressTime = useRef(0);
      const synthIntervalRef = useRef(null);
      const timerIntervalRef = useRef(null);
      const audioContextRef = useRef(null);

      // Synthesis Player Helper
      const playTone = (freq, duration, type = 'sine', volume = 0.4) => {
        if (isMuted) return;
        try {
          if (!audioContextRef.current) {
            audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
          }
          const ctx = audioContextRef.current;
          if (ctx.state === 'suspended') {
            ctx.resume();
          }
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime);

          gain.gain.setValueAtTime(volume, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (e) {
          console.error('Audio synthesis failed', e);
        }
      };

      // CPR Speed compression click feedback
      const handleCompress = () => {
        const now = Date.now();
        playTone(160, 0.4, 'triangle', 0.85); // Deep chest compression thump
        playTone(1300, 0.05, 'sine', 0.12);    // Micro skin friction click

        if (lastPressTime.current > 0) {
          const delta = now - lastPressTime.current;
          const calculatedBpm = Math.round(60000 / delta);
          
          if (calculatedBpm > 40 && calculatedBpm < 220) {
            setCurrentBpm(calculatedBpm);
            setBpmHistory(prev => {
              const updated = [...prev.slice(-9), calculatedBpm];
              return updated;
            });

            // Target CPR frequency check (optimal range: 100 - 120 bpm)
            if (calculatedBpm >= 100 && calculatedBpm <= 120) {
              setScore(s => s + 1);
            }
          }
        }
        lastPressTime.current = now;
      };

      // Start Training metronome challenge
      const startChallenge = () => {
        setChallengeActive(true);
        setTimerSeconds(30);
        setScore(0);
        setBpmHistory([]);
        setCurrentBpm(0);
        setResultGrade(null);
        lastPressTime.current = 0;

        // Metronome synth tick at exactly 110 BPM (Target midpoint)
        const tickIntervalMs = 60000 / 110;
        synthIntervalRef.current = setInterval(() => {
          playTone(880, 0.08, 'sine', 0.3); // Perfect warning pitch
        }, tickIntervalMs);

        timerIntervalRef.current = setInterval(() => {
          setTimerSeconds(prev => {
            if (prev <= 1) {
              clearInterval(timerIntervalRef.current);
              clearInterval(synthIntervalRef.current);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      // Stop & grading
      useEffect(() => {
        if (timerSeconds === 0 && challengeActive) {
          setChallengeActive(false);
          let grade = '일반인 수료증';
          if (score >= 25) grade = '정예 소방대원급 골드라이센스 (최우수)';
          else if (score >= 12) grade = '우수 이수 등급 (매우 훌륭함)';
          setResultGrade(grade);
          playTone(523.25, 0.15, 'sine', 0.35); // Arpeggio success fanfar
          setTimeout(() => playTone(659.25, 0.15, 'sine', 0.35), 150);
          setTimeout(() => playTone(783.99, 0.3, 'sine', 0.45), 300);
        }
      }, [timerSeconds, challengeActive, score]);

      useEffect(() => {
        return () => {
          clearInterval(synthIntervalRef.current);
          clearInterval(timerIntervalRef.current);
        };
      }, []);

      const avgBpm = bpmHistory.length ? Math.round(bpmHistory.reduce((a, b) => a + b, 0) / bpmHistory.length) : 0;
      const bpmAccuracy = avgBpm >= 100 && avgBpm <= 120;

      return (
        <div className="animate-fade-in space-y-4 p-4">
          <div className="flex items-center justify-between border-b border-slate-100 pb-3">
            <div>

                <Icon name="heartPulse" className="w-5 h-5 text-[#e41e26] mr-1.5 animate-heartbeat" />
                골든타임 심폐소생술 훈련실
              </h3>
              <p className="text-[10px] text-gray-500 font-medium">분당 100~120회의 정확한 페이스로 압박 연습</p>

    // Sub-Component 3: Field CCTV & Live Report Control Module
    function FieldSupport({ onAddIncident }) {
      const [panLevel, setPanLevel] = useState(0);
      const [currentCam, setCurrentCam] = useState(1);
      const [detectedHgh, setDetectedHgh] = useState(78);
      const [isRecording, setIsRecording] = useState(true);

      // Report input states
      const [formData, setFormData] = useState({
        type: '화재',
        location: '',
        detail: '',
        regionId: 'seo',
      });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');
      const [successMessage, setSuccessMessage] = useState('');

      const canvasRef = useRef(null);

      // Thermal visualizer sweep rendering on canvas
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationId;
        const colors = ['#e41e26', '#b45309', '#0284c7', '#2563eb'];
        let lineY = 0;

        const render = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Deep cosmic back-render
          ctx.fillStyle = '#010313';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // CCTV Grid lines
          ctx.strokeStyle = 'rgba(0, 240, 255, 0.05)';
          ctx.lineWidth = 1;
          for (let i = 0; i < canvas.width; i += 20) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.stroke();
          }
          for (let j = 0; j < canvas.height; j += 20) {
            ctx.beginPath();
            ctx.moveTo(0, j);
            ctx.lineTo(canvas.width, j);
            ctx.stroke();
          }

          // Thermal simulation hazard block
          const heartBeatScale = 1 + Math.sin(Date.now() / 150) * 0.04;
          const blockCenterX = canvas.width / 2 + panLevel * 10;
          ctx.save();
          ctx.translate(blockCenterX, canvas.height / 2);
          ctx.scale(heartBeatScale, heartBeatScale);

          // Glowing hazard spot gradient
          const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 40);
          grad.addColorStop(0, 'rgba(228, 30, 38, 0.9)');
          grad.addColorStop(0.3, 'rgba(217, 119, 6, 0.6)');
          grad.addColorStop(0.7, 'rgba(37, 99, 235, 0.2)');
          grad.addColorStop(1, 'transparent');

          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(0, 0, 45, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          // Green CCTV scan sweeping bar
          lineY = (lineY + 1.2) % canvas.height;
          ctx.strokeStyle = 'rgba(0, 240, 255, 0.45)';
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(0, lineY);
          ctx.lineTo(canvas.width, lineY);
          ctx.stroke();

          // Horizontal green target lock
          ctx.strokeStyle = 'rgba(228, 30, 38, 0.7)';
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(blockCenterX - 35, canvas.height / 2);
          ctx.lineTo(blockCenterX + 35, canvas.height / 2);
          ctx.moveTo(blockCenterX, canvas.height / 2 - 35);
          ctx.lineTo(blockCenterX, canvas.height / 2 + 35);
          ctx.stroke();

          // CCTV HUD telemetry data text
          ctx.fillStyle = 'rgba(0, 240, 255, 0.85)';
          ctx.font = '7px JetBrains Mono';
          ctx.fillText(`CAM_${currentCam.toString().padStart(2, '0')}_LIVE: FEED_OK`, 10, 15);
          ctx.fillText(`Y_AXIS_LOC: ${Math.round(lineY)}px`, 10, 25);
          ctx.fillText(`X_PAN_LVL: ${panLevel > 0 ? '+' : ''}${panLevel}m`, 10, 35);
          
          ctx.fillStyle = 'rgba(228, 30, 38, 0.95)';
          ctx.font = '8px JetBrains Mono';
          ctx.fillText(`THERM_MAX: ${detectedHgh}°C [위험군]`, 10, canvas.height - 10);

          animationId = requestAnimationFrame(render);
        };

        render();

        return () => {
          cancelAnimationFrame(animationId);
        };
      }, [panLevel, currentCam, detectedHgh]);

      // Periodic random thermal fluctuation
      useEffect(() => {
        const tid = setInterval(() => {
          setDetectedHgh(prev => {

                      <div className="flex items-center space-x-1">
                        <span className="w-1.5 h-3 bg-red-600 rounded-sm"></span>
                        <h4 className="text-xs font-black text-slate-800">실시간 재난 출동 목록</h4>
                      </div>
                      <span className="text-[9px] text-gray-400 font-extrabold">최근 15분 이내</span>
                    </div>

                    {/* Filter and Query bar */}
                    <div className="bg-white rounded-xl border border-slate-100 p-2.5 flex items-center space-x-2 shadow-xs">
                      <div className="relative flex-1">
                        <Icon name="search" className="w-3.5 h-3.5 text-gray-400 absolute left-2.5 top-1/2 -translate-y-1/2" />
                        <input
                          type="text"
                          placeholder="지역 또는 사고지명 검색"
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          className="w-full text-[10px] font-bold pl-8 pr-2.5 py-1.5 border border-slate-200 rounded-lg focus:outline-none focus:border-[#0f285c]"
                        />
                      </div>
                      <select
                        value={filterType}
                        onChange={(e) => setFilterType(e.target.value)}
                        className="text-[10px] font-black bg-slate-50 border border-slate-200 py-1.5 px-2 rounded-lg"
                      >
                        <option value="all">전체 구분</option>
                        <option value="화재">화재</option>
                        <option value="구조">구조</option>
                        <option value="구급">구급</option>
                      </select>
                    </div>

                    {/* Incident card list */}
                    <div className="space-y-2.5">
                      {filteredIncidents.length > 0 ? (
                        filteredIncidents.map((inc) => {
                          let typeBadgeColor = 'bg-red-50 text-red-600 border border-red-100';
                          if (inc.type === '구조') typeBadgeColor = 'bg-amber-50 text-amber-600 border border-amber-100';
                          if (inc.type === '구급') typeBadgeColor = 'bg-blue-50 text-blue-600 border border-blue-100';

                          return (
                            <div key={inc.id} className="bg-white border border-slate-100 rounded-2xl p-3.5 shadow-xs transition-all hover:scale-101 hover:border-[#0f285c]/10 flex flex-col justify-between space-y-2">
                              <div className="flex items-center justify-between">
                                <div className="flex items-center space-x-1.5">
                                  <span className={`px-2 py-0.5 rounded text-[8.5px] font-black ${typeBadgeColor}`}>
                                    {inc.type}
                                  </span>
                                  <span className="text-[10px] text-gray-400 font-extrabold">{inc.time}</span>
                                </div>
                                <span className={`px-2 py-0.5 rounded text-[8.5px] font-black ${
                                  inc.status === '완료' || inc.status === '인계완료' ? 'bg-slate-100 text-slate-500' : 'bg-red-500 text-white animate-pulse'
                                }`}>
                                  {inc.status}
                                </span>
                              </div>

                              <div className="space-y-0.5">
                                <h5 className="text-xs font-black text-slate-800 flex items-center">
                                  <Icon name="mapPin" className="w-3.5 h-3.5 mr-1 text-slate-400 inline shrink-0" />
                                  {inc.location}
                                </h5>
                                <p className="text-[10px] text-slate-550 leading-relaxed font-bold pl-4.5">{inc.detail}</p>
                              </div>
                            </div>
                          );
                        })
                      ) : (
                        <div className="bg-white border rounded-2xl p-8 text-center text-[10px] font-extrabold text-gray-400">
                          검색 조건에 맞는 실시간 대응 상황이 없습니다.
                        </div>
                      )}
                    </div>
                  </section>

                  {/* Safety Quick reference guidelines */}
                  <section className="px-4 space-y-3 pt-1">
                    <div className="flex items-center space-x-1 select-none">
                      <span className="w-1.5 h-3 bg-blue-600 rounded-sm"></span>
                      <h4 className="text-xs font-black text-slate-800">재난별 필수 시민 대처 수칙</h4>
                    </div>

                    <div className="grid grid-cols-1 gap-2.5">
                      {SAFETY_QUICK_GUIDES.map((guide) => (
                        <div key={guide.id} className="bg-slate-50 border border-slate-100 rounded-xl p-3 flex items-start space-x-3 hover:bg-white transition-all">
                          <div className="w-9 h-9 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 shrink-0 border border-blue-100 shadow-xs">
                            <Icon name={guide.icon} className="w-4 h-4" />
                          </div>
                          <div>
                            <h5 className="text-[11.5px] font-black text-slate-800">{guide.title}</h5>
                            <p className="text-[9.5px] text-slate-500 leading-relaxed mt-0.5 font-bold">{guide.desc}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>
                </div>
              )}

              {activeTab === 'cctv' && <FieldSupport onAddIncident={handleAddIncident} />}
              {activeTab === 'cpr' && <CPRManager />}
              {activeTab === 'quiz' && <SafetyQuiz />}
            </main>

            {/* Bottom Global Ribbon Navigation Bar */}
            <nav className="bg-white border-t border-slate-100 py-2.5 flex items-center justify-around shrink-0 relative z-15 shadow-22xl select-none">
              <button 
                onClick={() => setActiveTab('dashboard')}
                className={`flex flex-col items-center space-y-0.5 px-3 transition-colors ${activeTab === 'dashboard' ? 'text-[#0f285c]' : 'text-slate-400 hover:text-slate-600'}`}
              >
                <Icon name="radio" className="w-5 h-5 flex-shrink-0" />
                <span className="text-[10px] font-black tracking-widest">종합현황</span>
              </button>
              
              <button 
                onClick={() => setActiveTab('cctv')}
                className={`flex flex-col items-center space-y-0.5 px-3 transition-colors ${activeTab === 'cctv' ? 'text-[#0f285c]' : 'text-slate-400 hover:text-slate-600'}`}
              >
                <Icon name="tv" className="w-5 h-5 flex-shrink-0" />
                <span className="text-[10px] font-black tracking-widest">원격CCTV</span>
              </button>
              
              <button 
                onClick={() => setActiveTab('cpr')}
                className={`flex flex-col items-center space-y-0.5 px-3 transition-colors ${activeTab === 'cpr' ? 'text-[#0f285c]' : 'text-slate-400 hover:text-slate-600'}`}
              >
                <Icon name="heartPulse" className="w-5 h-5 flex-shrink-0" />
                <span className="text-[10px] font-black tracking-widest">CPR센터</span>
              </button>
              
              <button 
                onClick={() => setActiveTab('quiz')}
                className={`flex flex-col items-center space-y-0.5 px-3 transition-colors ${activeTab === 'quiz' ? 'text-[#0f285c]' : 'text-slate-400 hover:text-slate-600'}`}
              >
                <Icon name="award" className="w-5 h-5 flex-shrink-0" />
                <span className="text-[10px] font-black tracking-widest">교육수령</span>
              </button>
            </nav>

          </div>
        </div>
      );
    }

    // Mount React Applet To Root DOM
    const root = createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
