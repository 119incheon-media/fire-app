<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인천소방본부 상황판 App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (브라우저 실시간 컴파일) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-gray-900 m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // React/ReactDOM 전역 객체 사용 (Import 제거)
        const { useState } = React;

        // 아이콘 정의
        const Home = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const Video = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2" ry="2"/></svg>;
        const BookOpen = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const Youtube = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>;
        const Menu = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const ChevronRight = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;

        const INCHEON_REGIONS = [
            { id: 'all', name: '전체', fire: 0, rescue: 0, ems: 0 },
            { id: 'ganghwa', name: '강화군', fire: 2, rescue: 4, ems: 18 },
            { id: 'seo', name: '서구', fire: 4, rescue: 15, ems: 62 },
            { id: 'gyeyang', name: '계양구', fire: 1, rescue: 7, ems: 31 },
            { id: 'bupyeong', name: '부평구', fire: 2, rescue: 10, ems: 48 },
            { id: 'namdong', name: '남동구', fire: 3, rescue: 12, ems: 55 },
            { id: 'michuhol', name: '미추홀구', fire: 2, rescue: 8, ems: 42 },
            { id: 'yeonsu', name: '연수구', fire: 1, rescue: 6, ems: 38 },
            { id: 'jung', name: '중구', fire: 0, rescue: 2, ems: 15 },
            { id: 'jung-yeongjong', name: '중구(영종)', fire: 1, rescue: 5, ems: 24 },
            { id: 'ongjin', name: '옹진군', fire: 0, rescue: 1, ems: 5 },
        ];

        function IncheonFireApp() {
            const [activeTab, setActiveTab] = useState('home');
            const [selectedRegionId, setSelectedRegionId] = useState('all');

            const totalStats = INCHEON_REGIONS.reduce((acc, region) => {
                if (region.id !== 'all') {
                    acc.fire += region.fire;
                    acc.rescue += region.rescue;
                    acc.ems += region.ems;
                }
                return acc;
            }, { fire: 0, rescue: 0, ems: 0 });

            const currentRegionData = selectedRegionId === 'all' 
                ? { name: '전체', ...totalStats }
                : INCHEON_REGIONS.find(r => r.id === selectedRegionId);

            return (
                <div className="min-h-screen flex items-center justify-center p-0 sm:p-6 relative bg-gray-900" style={{backgroundImage: `url('https://images.unsplash.com/photo-1627503460670-65239e2d3122?auto=format&fit=crop&w=2000&q=80')`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundAttachment: 'fixed'}}>
                    <div className="absolute inset-0 bg-black/50 bg-gradient-to-br from-[#0f285c]/80 via-black/40 to-[#e41e26]/40 backdrop-blur-[2px]"></div>
                    <div className="w-full h-screen sm:h-[842px] max-w-[390px] bg-white/95 backdrop-blur-2xl flex flex-col relative sm:rounded-[2.5rem] sm:border-[6px] border-gray-800 shadow-[0_20px_60px_rgba(0,0,0,0.7)] overflow-hidden ring-1 ring-white/20 z-10">
                        <header className="bg-white/80 backdrop-blur-md px-4 py-3 flex items-center justify-between border-b border-gray-100">
                            <div className="flex items-center space-x-2">
                                <h1 className="text-lg font-black text-gray-900">인천소방본부</h1>
                            </div>
                            <button className="p-1.5 rounded-full hover:bg-gray-100"><Menu className="w-6 h-6"/></button>
                        </header>
                        <main className="flex-1 overflow-y-auto hide-scrollbar bg-gray-50/50 pb-6">
                            {activeTab === 'home' && (
                                <div className="animate-fade-in">
                                    <div className="bg-gradient-to-r from-[#0f285c] via-[#1a408b] to-[#0f285c] px-5 py-7 text-white shadow-inner">
                                        <h2 className="text-xl font-black mb-1.5 text-transparent bg-clip-text bg-gradient-to-r from-white to-blue-100">인천시민의 안전을 지킵니다</h2>
                                    </div>
                                    <section className="px-4 py-6 mt-[-15px] bg-white rounded-t-3xl space-y-6">
                                        <h2 className="text-lg font-black text-gray-900 flex items-center"><span className="w-1.5 h-4 bg-[#e41e26] mr-2 rounded-sm"></span>인천 재난현황</h2>
                                        <div className="grid grid-cols-4 gap-2">
                                            {INCHEON_REGIONS.map((region) => (
                                                <button key={region.id} onClick={() => setSelectedRegionId(region.id)} className={`py-2 text-[10px] font-bold border rounded-xl ${selectedRegionId === region.id ? 'border-[#0f285c] text-white bg-blue-900' : 'border-gray-200 text-gray-600'}`}>{region.name}</button>
                                            ))}
                                        </div>
                                        <div className="bg-gray-50 rounded-2xl p-4 text-center">
                                            <h3 className="text-sm font-black mb-2">{currentRegionData.name} 통계</h3>
                                            <div className="grid grid-cols-3 gap-2">
                                                <div className="bg-white p-2 rounded-lg"><p className="text-[10px] text-gray-500">화재</p><p className="font-black text-[#e41e26]">{currentRegionData.fire}</p></div>
                                                <div className="bg-white p-2 rounded-lg"><p className="text-[10px] text-gray-500">구조</p><p className="font-black text-orange-500">{currentRegionData.rescue}</p></div>
                                                <div className="bg-white p-2 rounded-lg"><p className="text-[10px] text-gray-500">구급</p><p className="font-black text-[#1a408b]">{currentRegionData.ems}</p></div>
                                            </div>
                                        </div>
                                        <button onClick={() => window.open('https://www.incheon.go.kr/119/NE030201', '_blank')} className="w-full bg-[#0f285c] text-white py-4 rounded-xl font-bold flex items-center justify-center">일일종합상황 상세 보기 <ChevronRight className="w-4 h-4"/></button>
                                    </section>
                                </div>
                            )}
                            {activeTab === 'safety' && (
                                <div className="animate-fade-in p-6 space-y-4">
                                    <h2 className="text-lg font-black mb-4">안전수칙 가이드</h2>
                                    {[ { title: '화재 대피', desc: '낮은 자세로 젖은 수건을 코와 입에 대고 이동하세요.' }, { title: '지진 대피', desc: '탁자 아래로 들어가 머리를 보호하고 진동이 멈추면 대피하세요.' }, { title: '심폐소생술(CPR)', desc: '양손 중앙 압박, 1초에 2회 속도로 강하게 압박하세요.' } ].map((item, i) => (
                                        <div key={i} className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm"><h3 className="font-black text-[#0f285c] mb-1">{item.title}</h3><p className="text-xs text-gray-600">{item.desc}</p></div>
                                    ))}
                                </div>
                            )}
                            {activeTab === 'tv' && (
                                <div className="animate-fade-in p-4 space-y-4">
                                    <h2 className="text-xl font-black mb-4">인천소방TV</h2>
                                    <div className="aspect-video w-full bg-black rounded-xl overflow-hidden shadow-lg mb-4">
                                        <iframe className="w-full h-full" src="https://www.youtube.com/embed/videoseries?list=UU6G32nQpW-P2V5a-2YJpP2w" title="YouTube" allowFullScreen></iframe>
                                    </div>
                                    <button onClick={() => window.open('https://www.youtube.com/@119incheon', '_blank')} className="w-full bg-red-600 text-white py-3 rounded-xl font-bold">유튜브 채널 바로가기</button>
                                </div>
                            )}
                        </main>
                        <nav className="bg-white border-t border-gray-100 pt-2 pb-6 px-2 flex justify-around">
                            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center w-full ${activeTab === 'home' ? 'text-[#0f285c]' : 'text-gray-400'}`}><Home className="w-6 h-6"/><span className="text-[10px] font-bold">홈</span></button>
                            <button onClick={() => window.open('http://safe.m119.go.kr/', '_blank')} className="flex flex-col items-center w-full text-gray-400"><Video className="w-6 h-6"/><span className="text-[10px] font-bold">현장지원</span></button>
                            <button onClick={() => setActiveTab('safety')} className={`flex flex-col items-center w-full ${activeTab === 'safety' ? 'text-[#0f285c]' : 'text-gray-400'}`}><BookOpen className="w-6 h-6"/><span className="text-[10px] font-bold">안전수칙</span></button>
                            <button onClick={() => setActiveTab('tv')} className={`flex flex-col items-center w-full ${activeTab === 'tv' ? 'text-[#e41e26]' : 'text-gray-400'}`}><Youtube className="w-6 h-6"/><span className="text-[10px] font-bold">소방TV</span></button>
                        </nav>
                    </div>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IncheonFireApp />);
    </script>
</body>
</html>
