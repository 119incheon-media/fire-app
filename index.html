<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인천소방본부 상황판 App</title>
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map: react/jsx-runtime 모듈 에러를 완벽하게 해결하기 위한 ES Module 매핑 -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react-dom/client": "https://esm.sh/react-dom@18/client",
            "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime"
        }
    }
    </script>
    
    <!-- Babel (브라우저에서 React 코드를 해석해주는 컴파일러) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 사용자 정의 스타일 (애니메이션 및 스크롤바 숨김) -->
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-gray-900 m-0 p-0 overflow-hidden">
    <!-- 앱이 렌더링될 메인 영역 -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';

        // 아이콘 컴포넌트 직접 정의
        const Home = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const Video = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2" ry="2"/></svg>;
        const BookOpen = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const Youtube = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/></svg>;
        const Menu = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const ChevronRight = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;

        const FlameIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
        const ActivityIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const HeartIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;

        const INCHEON_REGIONS = [
            { id: 'all', name: '전체', fire: 0, rescue: 0, ems: 0 },
            { id: 'ganghwa', name: '강화군', fire: 2, rescue: 4, ems: 18 },
            { id: 'seo', name: '서구', fire: 4, rescue: 15, ems: 62 },
            { id: 'gyeyang', name: '계양구', fire: 1, rescue: 7, ems: 31 },
            { id: 'bupyeong', name: '부평구', fire: 2, rescue: 10, ems: 48 },
            { id: 'namdong', name: '남동구', fire: 3, rescue: 12, ems: 55 },
            { id: 'michuhol', name: '미추홀구', fire: 2, rescue: 8, ems: 42 },
            { id: 'yeonsu', name: '연수구', fire: 1, rescue: 6, ems: 38 },
            { id: 'jung', name: '중구', fire: 0, rescue: 2, ems: 15 },
            { id: 'jung-yeongjong', name: '중구(영종)', fire: 1, rescue: 5, ems: 24 },
            { id: 'ongjin', name: '옹진군', fire: 0, rescue: 1, ems: 5 },
        ];

        function IncheonFireApp() {
            const [activeTab, setActiveTab] = useState('home');
            const [selectedRegionId, setSelectedRegionId] = useState('all');

            const totalStats = INCHEON_REGIONS.reduce((acc, region) => {
                if (region.id !== 'all') {
                    acc.fire += region.fire;
                    acc.rescue += region.rescue;
                    acc.ems += region.ems;
                }
                return acc;
            }, { fire: 0, rescue: 0, ems: 0 });

            const currentRegionData = selectedRegionId === 'all' 
                ? { name: '전체', ...totalStats }
                : INCHEON_REGIONS.find(r => r.id === selectedRegionId);

            return (
                <div 
                    className="min-h-screen flex items-center justify-center p-0 sm:p-6 font-sans relative bg-gray-900"
                    style={{
                        backgroundImage: `url('https://images.unsplash.com/photo-1627503460670-65239e2d3122?auto=format&fit=crop&w=2000&q=80')`,
                        backgroundSize: 'cover',
                        backgroundPosition: 'center',
                        backgroundAttachment: 'fixed'
                    }}
                >
                    <div className="absolute inset-0 bg-black/50 bg-gradient-to-br from-[#0f285c]/80 via-black/40 to-[#e41e26]/40 backdrop-blur-[2px]"></div>

                    <div className="w-full h-screen sm:h-[842px] max-w-[390px] bg-white/95 backdrop-blur-2xl flex flex-col relative sm:rounded-[2.5rem] sm:border-[6px] border-gray-800 shadow-[0_20px_60px_rgba(0,0,0,0.7)] overflow-hidden ring-1 ring-white/20 z-10">
                        <header className="bg-white/80 backdrop-blur-md px-4 py-3 flex items-center justify-between relative z-10 border-b border-gray-100">
                            <div className="flex items-center space-x-2">
                                <img src={encodeURI("인천소방본부(심벌마크).png")} alt="인천소방 로고" className="w-9 h-9 object-contain drop-shadow-sm" onError={(e) => { e.target.style.display = 'none'; }}/>
                                <h1 className="text-lg font-black text-gray-900 tracking-tight">인천소방본부</h1>
                            </div>
                            <button className="p-1.5 rounded-full hover:bg-gray-100 transition-colors"><Menu className="w-6 h-6 text-gray-800" /></button>
                        </header>

                        <main className="flex-1 overflow-y-auto hide-scrollbar bg-gray-50/50 pb-6">
                            {activeTab === 'home' && (
                                <div className="animate-fade-in">
                                    <div className="bg-gradient-to-r from-[#0f285c] via-[#1a408b] to-[#0f285c] px-5 py-7 text-white shadow-inner relative overflow-hidden">
                                        <h2 className="text-xl font-black mb-1.5 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-blue-100">인천시민의 안전을 지킵니다</h2>
                                    </div>
                                    <section className="px-4 py-6 mt-[-15px] bg-white rounded-t-3xl relative shadow-[0_-4px_15px_rgba(0,0,0,0.05)] flex flex-col space-y-6">
                                        <div>
                                            <h2 className="text-lg font-black text-gray-900 tracking-tight flex items-center"><span className="w-1.5 h-4 bg-[#e41e26] mr-2 rounded-sm"></span>인천 재난현황</h2>
                                            <p className="text-[11px] text-gray-500 mt-1 ml-3.5 font-medium">버튼을 탭하여 지역별 통계를 확인하세요.</p>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            {INCHEON_REGIONS.map((region) => (
                                                <button key={region.id} onClick={() => setSelectedRegionId(region.id)} className={`py-2.5 text-[11px] font-bold border rounded-xl transition-all duration-200 ${selectedRegionId === region.id ? 'border-[#0f285c] text-white bg-gradient-to-b from-[#1a408b] to-[#0f285c] shadow-md transform scale-105' : 'border-gray-200 text-gray-600 bg-white hover:bg-gray-50 active:scale-95'}`}>{region.name}</button>
                                            ))}
                                        </div>
                                        <div className="w-full pt-2">
                                            <div className="bg-gray-50 rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                                                <h3 className="text-sm font-black text-center text-gray-800 py-3 bg-gray-100/80 border-b border-gray-200">{currentRegionData.name === '전체' ? '인천 전체 통계' : `${currentRegionData.name} 통계`}</h3>
                                                <table className="w-full text-center border-collapse bg-white">
                                                    <tbody>
                                                        <tr className="border-b border-gray-50"><td className="py-3.5 border-r border-gray-50 text-sm font-medium text-gray-700">화재출동</td><td className="py-3.5 font-black">{currentRegionData.fire}</td></tr>
                                                        <tr className="border-b border-gray-50"><td className="py-3.5 border-r border-gray-50 text-sm font-medium text-gray-700">구조출동</td><td className="py-3.5 font-black">{currentRegionData.rescue}</td></tr>
                                                        <tr><td className="py-3.5 border-r border-gray-50 text-sm font-medium text-gray-700">구급출동</td><td className="py-3.5 font-black">{currentRegionData.ems}</td></tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                        <button onClick={() => window.open('https://www.incheon.go.kr/119/NE030201', '_blank')} className="w-full bg-[#0f285c] hover:bg-[#0a1b3f] text-white py-4 rounded-xl font-bold transition-colors flex items-center justify-center mt-2 text-sm group">일일종합상황 상세 보기 <ChevronRight className="w-4 h-4 ml-1" /></button>
                                    </section>
                                </div>
                            )}
                            {activeTab === 'safety' && (
                                <div className="animate-fade-in px-4 py-6">
                                    <h2 className="text-xl font-black mb-6">시민 안전수칙</h2>
                                    <div className="bg-white rounded-2xl p-4 shadow-sm mb-4 border border-gray-100"><h3 className="font-bold mb-2 flex items-center"><FlameIcon className="w-5 h-5 mr-2 text-red-500" /> 화재 대피</h3><p className="text-xs text-gray-600">젖은 수건으로 코/입을 막고 낮은 자세로 계단을 이용해 대피하세요.</p></div>
                                    <div className="bg-white rounded-2xl p-4 shadow-sm mb-4 border border-gray-100"><h3 className="font-bold mb-2 flex items-center"><ActivityIcon className="w-5 h-5 mr-2 text-amber-500" /> 지진 대피</h3><p className="text-xs text-gray-600">탁자 아래로 들어가 몸을 보호하고 흔들림이 멈추면 야외로 이동하세요.</p></div>
                                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100"><h3 className="font-bold mb-2 flex items-center"><HeartIcon className="w-5 h-5 mr-2 text-rose-500" /> 심폐소생술</h3><p className="text-xs text-gray-600">환자 가슴 중앙을 100~120회 속도로 강하게 압박하세요.</p></div>
                                </div>
                            )}
                        </main>

                        <nav className="bg-white border-t border-gray-100 pb-safe pt-2 pb-4 px-2 relative z-20 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                            <div className="flex justify-around items-center">
                                <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center space-y-1 w-full p-1 ${activeTab === 'home' ? 'text-[#0f285c]' : 'text-gray-400'}`}><Home className="w-6 h-6" /><span className="text-[10px] font-bold">홈</span></button>
                                <button onClick={() => window.open('http://safe.m119.go.kr/', '_blank')} className="flex flex-col items-center space-y-1 w-full p-1 text-gray-400 hover:text-[#0f285c]"><Video className="w-6 h-6" /><span className="text-[10px] font-bold">현장지원</span></button>
                                <button onClick={() => setActiveTab('safety')} className={`flex flex-col items-center space-y-1 w-full p-1 ${activeTab === 'safety' ? 'text-[#0f285c]' : 'text-gray-400'}`}><BookOpen className="w-6 h-6" /><span className="text-[10px] font-bold">안전수칙</span></button>
                                <button onClick={() => setActiveTab('tv')} className={`flex flex-col items-center space-y-1 w-full p-1 ${activeTab === 'tv' ? 'text-[#e41e26]' : 'text-gray-400'}`}><Youtube className="w-6 h-6" /><span className="text-[10px] font-bold">소방TV</span></button>
                            </div>
                        </nav>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<IncheonFireApp />);
    </script>
</body>
</html>
